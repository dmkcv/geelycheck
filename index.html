<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер автозапчастей концерна Geely</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    </script>

    <style>
        :root {
            --primary: #0056b3;
            --bg: #f0f2f5;
            --card: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        h1 { margin: 0 0 20px 0; text-align: center; color: #333; font-size: 1.4rem; }

        /* Brand Selector */
        .brand-selector {
            display: flex;
            border: 1px solid var(--primary);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .brand-option { flex: 1; position: relative; }
        .brand-option input { position: absolute; opacity: 0; }
        .brand-option label {
            display: block;
            padding: 12px 0;
            text-align: center;
            background: #fff;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-right: 1px solid var(--primary);
            transition: 0.2s;
        }
        .brand-option:last-child label { border-right: none; }
        .brand-option input:checked + label {
            background: var(--primary);
            color: white;
        }

        /* Video Area (Nimiq Scanner) */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }
        .scanner-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scan-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        
        .btn {
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn-stop { background: #dc3545; color: white; display: none; }
        
        .btn-flash { 
            position: absolute; bottom: 20px; right: 20px; 
            background: rgba(255,255,255,0.3); 
            border: 1px solid rgba(255,255,255,0.5);
            color: white; border-radius: 50%; 
            width: 50px; height: 50px; font-size: 24px;
            z-index: 10; display: none;
        }

        /* Results */
        .result-card {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .row:last-child { border-bottom: none; }
        .lbl { font-weight: bold; opacity: 0.7; font-size: 0.9rem; }
        .val { font-weight: 500; text-align: right; }

        .loader {
            display: none;
            text-align: center;
            color: var(--primary);
            margin: 20px 0;
            font-weight: bold;
        }
        
        #html5-qr-reader { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Сканер автозапчастей концерна Geely</h1>

    <div class="brand-selector">
        <div class="brand-option"><input type="radio" name="brand" id="b_geely" value="GEELY" checked><label for="b_geely">Geely</label></div>
        <div class="brand-option"><input type="radio" name="brand" id="b_zeekr" value="ZEEKR"><label for="b_zeekr">Zeekr</label></div>
        <div class="brand-option"><input type="radio" name="brand" id="b_lynk" value="LYNKCO"><label for="b_lynk">Lynk</label></div>
        <div class="brand-option"><input type="radio" name="brand" id="b_lining" value="LINING"><label for="b_lining">Lining</label></div>
    </div>

    <!-- Область камеры (для Nimiq Scanner) -->
    <div class="scanner-wrapper" id="scannerWrapper">
        <video id="qr-video"></video>
        <div class="scan-overlay"></div>
        <button class="btn btn-flash" id="flashBtn" onclick="toggleFlash()">🔦</button>
    </div>

    <div id="html5-qr-reader"></div>

    <div class="controls">
        <button class="btn btn-primary" id="btnStart" onclick="startCamera()">Включить камеру</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopCamera()">Выключить</button>

        <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">Загрузить фото</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFromFile(this)">
        
        <button class="btn btn-primary" id="btnReset" style="display:none" onclick="window.location.reload()">🔄 Проверить другую</button>
    </div>

    <div class="loader" id="loader">Идет проверка...</div>
    <div id="result" class="result-card"></div>
</div>

<script type="module">
    import QrScanner from 'https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js';
    QrScanner.WORKER_PATH = 'https://unpkg.com/qr-scanner@1.4.2/qr-scanner-worker.min.js';

    // Глобальные переменные
    let nimiqScanner = null; // Для камеры
    let html5FileScanner = null; // Для файлов
    
    const videoElem = document.getElementById('qr-video');
    const wrapper = document.getElementById('scannerWrapper');
    const resultElem = document.getElementById('result');
    const loader = document.getElementById('loader');
    const flashBtn = document.getElementById('flashBtn');

    // === ЛОГИКА КАМЕРЫ (Nimiq) ===
    window.startCamera = async () => {
        // UI
        resultElem.style.display = 'none';
        document.getElementById('btnReset').style.display = 'none';
        document.getElementById('btnStart').style.display = 'none';
        wrapper.style.display = 'block';
        document.getElementById('btnStop').style.display = 'flex';

        if (!nimiqScanner) {
            nimiqScanner = new QrScanner(
                videoElem,
                (result) => handleScanSuccess(result.data || result),
                { highlightScanRegion: true, maxScansPerSecond: 5, preferredCamera: 'environment' }
            );
        }

        try {
            await nimiqScanner.start();
            if (await nimiqScanner.hasFlash()) flashBtn.style.display = 'flex';
        } catch (e) {
            console.error(e);
            alert("Ошибка камеры: " + e);
            stopCamera();
        }
    };

    window.stopCamera = () => {
        if (nimiqScanner) {
            nimiqScanner.stop();
            flashBtn.style.display = 'none';
        }
        wrapper.style.display = 'none';
        document.getElementById('btnStop').style.display = 'none';
        document.getElementById('btnStart').style.display = 'flex';
    };

    window.toggleFlash = () => {
        if(nimiqScanner) {
            nimiqScanner.toggleFlash();
            flashBtn.classList.toggle('active');
        }
    };

    // === ЛОГИКА ФАЙЛА (Html5Qrcode) ===
    window.scanFromFile = async (input) => {
        if (!input.files.length) return;
        const file = input.files[0];
        
        stopCamera();
        
        loader.style.display = 'block';
        resultElem.style.display = 'none';

        try {
            if (!html5FileScanner) {
                html5FileScanner = new Html5Qrcode("html5-qr-reader", false);
            }

            const decodedText = await html5FileScanner.scanFile(file, true);
            handleScanSuccess(decodedText);
            
        } catch (err) {
            loader.style.display = 'none';
            console.error(err);
            alert("QR-код на фото не найден. Попробуйте обрезать фото или сделать его четче.");
        }
        input.value = ''; // Сброс инпута
    };

    // === ОБЩАЯ ЛОГИКА ===
    
    window.resetUI = () => {
        resultElem.style.display = 'none';
        document.getElementById('btnReset').style.display = 'none';
        if(!/Mobi|Android/i.test(navigator.userAgent)) window.startCamera();
    };

    function handleScanSuccess(text) {
        console.log("Decoded:", text);
        // Останавливаем камеру при успехе
        stopCamera();
        
        const uid = extractUID(text);
        if (uid) {
            fetchData(uid);
        } else {
            loader.style.display = 'none';
            alert("QR найден, но UID запчасти не обнаружен. Вероятно, это неоригинальная запчасть или она не подлежит внесению в базу запчастей.");
        }
    }

    function extractUID(text) {
        try {
            const url = new URL(text);
            const uid = url.searchParams.get("UID") || url.searchParams.get("uid");
            if (uid) return uid;
        } catch (e) {}
        const m = text.match(/[?&]UID=([^&]+)/i);
        if (m) return m[1];
        if (text.length > 10 && !text.includes(' ') && !text.includes('http')) return text;
        return null;
    }

    async function fetchData(uid) {
        const brand = document.querySelector('input[name="brand"]:checked').value;
        loader.style.display = 'block';
        document.querySelector('.controls').style.display = 'none';

        const baseUrl = "https://fangwei.geely.com/geelyServiceNew/domain/v1/wx/verify/spares";
        let url = `${baseUrl}?code=${uid}&t=${Date.now()}`;
        if (brand !== 'GEELY') url += `&brandCode=${brand}`;

        try {
            const res = await fetch(url, { headers: { 'Accept': 'application/json, text/plain, */*' } });
            const data = await res.json();
            renderResult(data, brand);
        } catch (e) {
            showError("Ошибка сети", e.message);
        } finally {
            loader.style.display = 'none';
            document.querySelector('.controls').style.display = 'flex';
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnReset').style.display = 'flex';
        }
    }

    function renderResult(data, brand) {
        resultElem.className = 'result-card';
        if (data && data.UID) {
            resultElem.classList.add('success');
            resultElem.innerHTML = `
                <h2 style="margin:0 0 15px 0; text-align:center">✅ Информация найдена</h2>
                <div class="row"><span class="lbl">UID коробки</span><span class="val">${data.UID}</span></div>
                <div class="row"><span class="lbl">Партномер</span><span class="val">${data.code||'-'}</span></div>
                
                <div class="row"><span class="lbl">Китайское название</span><span class="val" id="val-name">${data.name||'-'}</span></div>
                <div class="row" id="row-name-en" style="display:none; background:#f8f9fa; padding-left:10px; border-left:3px solid var(--primary);"><span class="lbl">🇬🇧 Название</span><span class="val" id="val-name-en"></span></div>
                
                <div class="row"><span class="lbl">Китайское описание</span><span class="val" id="val-desc">${data.desc||'-'}</span></div>
                <div class="row" id="row-desc-en" style="display:none; background:#f8f9fa; padding-left:10px; border-left:3px solid var(--primary);"><span class="lbl">🇬🇧 Описание</span><span class="val" id="val-desc-en"></span></div>
                
                <div class="row"><span class="lbl">Английское название</span><span class="val">${data.nameEn||'-'}</span></div>
                
                <div class="row" style="flex-direction:column"><span class="lbl">Производитель</span><span class="val" id="val-dealer" style="text-align:left; font-size:13px; margin-top:4px">${data.dealerName||'-'}</span></div>
                <div class="row" id="row-dealer-en" style="display:none; flex-direction:column; background:#f8f9fa; padding-left:10px; border-left:3px solid var(--primary);"><span class="lbl">🇬🇧 Производитель</span><span class="val" id="val-dealer-en" style="text-align:left; font-size:13px; margin-top:4px"></span></div>
                
                <p style="text-align: center; font-size:14px;">Убедитесь, что название запчасти выше совпадает с тем, что вы реально сканировали.</p>
            `;

            let delay = 0;
            if (data.name && data.name !== '-') {
                setTimeout(() => requestTranslation(data.name, 'name'), delay);
                delay += 3000;
            }
            if (data.desc && data.desc !== '-') {
                setTimeout(() => requestTranslation(data.desc, 'desc'), delay);
                delay += 3000;
            }
            if (data.dealerName && data.dealerName !== '-') {
                setTimeout(() => requestTranslation(data.dealerName, 'dealer'), delay);
            }

        } else {
            resultElem.classList.add('error');
            resultElem.innerHTML = `
                <h2 style="margin:0; text-align:center">❌ Подделка / не найдено в базе</h2>
                <p style="text-align:center; font-size:14px; margin-top:10px">Сервер не подтвердил этот код для бренда ${brand}.</p>
                <p style="text-align: center; color: #555; font-size: 14px;">Возможные причины:</p>
                <ul style="font-size: 14px; color: #555;">
                    <li>это подделка</li>
                    <li>запчасть не подлежит маркировке/внесению в БД</li>
                    <li>выбран неверный бренд (попробуйте переключить на Zeekr/Lynk)</li>
                    <li>ошибка на сервере Geely</li>
                </ul>
            `;
        }
        resultElem.style.display = 'block';
    }

    function showError(title, msg) {
        resultElem.className = 'result-card error';
        resultElem.innerHTML = `<h3>${title}</h3><p>${msg}</p>`;
        resultElem.style.display = 'block';
    }

    function requestTranslation(text, fieldId) {
        if (!window.md5) return;
        const salt = Date.now().toString();
        // Obfuscated credentials using base64
        const a = atob('MjAxOTAzMTUwMDAyNzc0OTU=');
        const k = atob('UU9RNE9ONHl6ZzMxdnlIUXg0ZHI=');
        
        const sign = md5(a + text + salt + k);
        const cbName = 'bdcb_' + Date.now() + Math.floor(Math.random()*10000);
        
        window[cbName] = function(res) {
            if (res && res.trans_result && res.trans_result.length > 0) {
                const translated = res.trans_result[0].dst;
                const row = document.getElementById('row-' + fieldId + '-en');
                const val = document.getElementById('val-' + fieldId + '-en');
                if (row && val) {
                    val.innerText = translated;
                    row.style.display = fieldId === 'dealer' ? 'flex' : 'flex';
                }
            }
            delete window[cbName];
            const s = document.getElementById(cbName);
            if (s) s.remove();
        };
        
        const script = document.createElement('script');
        script.id = cbName;
        script.src = `https://api.fanyi.baidu.com/api/trans/vip/translate?q=${encodeURIComponent(text)}&from=zh&to=en&appid=${a}&salt=${salt}&sign=${sign}&callback=${cbName}`;
        document.body.appendChild(script);
    }
</script>

</body>
</html>
